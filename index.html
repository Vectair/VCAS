<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0e1117" />
  <title>Eos</title>

  <!-- Apply saved theme before first paint to prevent flash -->
  <script>
    (function () {
      var m = localStorage.getItem("eos-theme-mode") || "auto";
      var theme = m === "day" ? "day"
                : m === "night" ? "night"
                : (new Date().getHours() >= 7 && new Date().getHours() < 19) ? "day" : "night";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="src/styles/eos.css" />
</head>
<body data-theme="night">

  <!-- Map layer (below everything) -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- Edge indicators layer (sits above map, below UI chrome) -->
  <div id="indicators-layer" style="position:fixed;inset:0;z-index:9;pointer-events:none;"></div>

  <!-- GPS unavailable message -->
  <div id="gps-message" class="hidden">
    <div class="card">
      <h2>Location unavailable</h2>
      <p>Eos needs your GPS position to work.<br>
         Please allow location access and reload the page.</p>
    </div>
  </div>

  <!-- ADS-B config missing banner -->
  <div id="config-banner" class="hidden">
    ⚙ ADS-B provider not configured — check src/config.js
  </div>

  <!-- Loading indicator -->
  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <span>Fetching aircraft…</span>
  </div>

  <!-- Aircraft detail popup -->
  <div id="popup" class="hidden"></div>

  <!-- Main overlay (top/bottom chrome) -->
  <div id="overlay">
    <!-- Top bar -->
    <div id="top-bar">
      <div class="brand">E<span>OS</span></div>
      <div id="mode-strip">
        <div id="mode-label">DRIVING VIEW</div>
      </div>
      <div id="top-right-controls">
        <div id="adsb-status" class="error">
          <div class="dot"></div>
          <span class="label">ADS-B</span>
        </div>
        <div id="theme-picker">
          <button class="theme-btn" id="theme-btn-day"   title="Day mode">☀</button>
          <button class="theme-btn" id="theme-btn-night" title="Night mode">🌙</button>
          <button class="theme-btn" id="theme-btn-auto"  title="Auto (time-based)">Auto</button>
        </div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Bottom bar -->
    <div id="bottom-bar">
      <!-- Mode row -->
      <div id="mode-row">
        <button class="mode-btn active-mode" id="btn-nav">NAV</button>
        <div id="aircraft-count">No aircraft in range</div>
        <button class="mode-btn route-btn" id="btn-test-route" title="Route to Liverpool Airport">↗</button>
        <button class="mode-btn" id="btn-air">AIR</button>
      </div>
      <!-- Theme row -->
      <div id="theme-row">
        <button class="theme-btn" id="btn-theme-day">Day</button>
        <button class="theme-btn active-theme" id="btn-theme-auto">Auto</button>
        <button class="theme-btn" id="btn-theme-night">Night</button>
      </div>
    </div>
  </div>

  <!-- Route summary card (shown when a route is active) -->
  <div id="route-card" class="hidden">
    <div class="route-card-icon">↗</div>
    <div class="route-card-body">
      <div class="route-card-dest" id="route-dest-name"></div>
      <div class="route-card-stats">
        <span id="route-dist-text"></span><span class="route-sep"> · </span><span id="route-eta-text"></span>
      </div>
    </div>
    <button class="route-card-clear" id="btn-clear-route" title="Clear route">✕</button>
  </div>

  <!-- MapLibre GL JS -->
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <!-- App modules (order matters — dependencies first) -->
  <script src="src/routing/routingProvider.js"></script>
  <script src="src/routing/osrmProvider.js"></script>
  <script src="src/config.js"></script>
  <script src="src/data/normaliseAircraft.js"></script>
  <script src="src/data/adsbExchangeClient.js"></script>
  <script src="src/logic/geo.js"></script>
  <script src="src/logic/visibility.js"></script>
  <script src="src/logic/indicators.js"></script>
  <script src="src/theme/themeController.js"></script>
  <script src="src/map/cameraController.js"></script>
  <script src="src/map.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/app.js"></script>

</body>
</html>
